name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
# For quick test on specific paths
#on:
# pull_request:
#   branches: [ "main" ]
#   paths:
#     - 'src/ApiOne/**'
#     - 'tests/ApiOne.Tests/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Update this if you are using .NET 7 or 9
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build Solution
      run: dotnet build --no-restore --configuration Release
      
    - name: Run Tests
      # Runs all test projects included in the solution
      run: dotnet test --no-build --verbosity normal --configuration Release